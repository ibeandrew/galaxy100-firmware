name: Build Galaxy 100 firmware

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (overlay)
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Install ARM toolchain (no apt mirrors)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Install build-essential + zstd (with retries for flaky mirrors)
        run: |
          sudo apt-get -o Acquire::Retries=8 -o Acquire::http::Timeout=20 update -y
          sudo apt-get -o Acquire::Retries=8 -o Acquire::http::Timeout=20 install -y build-essential zstd

      - name: Install QMK CLI
        run: pip install qmk

      - name: Clone Epomaker's QMK fork (their actual production tree)
        run: |
          git clone --depth=1 https://github.com/Epomaker/qmk_firmware.git qmk
          cd qmk
          git submodule update --init --recursive --depth=1

      - name: Install Epomaker QMK fork's Python deps
        run: pip install -r qmk/requirements.txt

      - name: Overlay Galaxy 100 keyboard files (their fork has EECONFIG_USER_DATABLOCK so rgb_record can be unstubbed)
        run: |
          mkdir -p qmk/keyboards/epomaker
          cp -r overlay/keyboards/epomaker/galaxy100 qmk/keyboards/epomaker/
          # Restore the original (non-stubbed) rgb_record.c since Epomaker's fork has the macros it needs
          curl -fsSL https://raw.githubusercontent.com/Epomaker/galaxy100/main/rgb_record.c -o qmk/keyboards/epomaker/galaxy100/rgb_record/rgb_record.c
          echo "--- restored rgb_record.c (first lines) ---"
          head -10 qmk/keyboards/epomaker/galaxy100/rgb_record/rgb_record.c
          echo "--- linker script flash0 line ---"
          grep "flash0 (rx)" qmk/keyboards/epomaker/galaxy100/ld/WB32FQ95xB.ld

      - name: Build firmware via gmake bypass (avoids qmk list-keyboards rejection)
        working-directory: qmk
        run: |
          mkdir -p ../offset-variants
          rm -rf .build
          # Use gmake directly with build_keyboard.mk to skip the keyboard discovery step
          # that earlier rejected our keyboard.json (only saw tide65)
          gmake -r -R -f builddefs/build_keyboard.mk -s \
            KEYBOARD=epomaker/galaxy100 \
            KEYMAP=default \
            KEYBOARD_FILESAFE=epomaker_galaxy100 \
            TARGET=epomaker_galaxy100_default \
            VERBOSE=false COLOR=true SILENT=false QMK_BIN="qmk" 2>&1 | tail -30
          ls -la .build/ 2>/dev/null || true
          if [ -f .build/epomaker_galaxy100_default.bin ]; then
            cp .build/epomaker_galaxy100_default.bin ../offset-variants/firmware-epomaker-fork.bin
            python3 -c 'import struct; d=open("../offset-variants/firmware-epomaker-fork.bin","rb").read(); sp,reset=struct.unpack("<II",d[:8]); print(f"size={len(d)} SP=0x{sp:08X} reset=0x{reset:08X}")'
          else
            echo "ERROR: build did not produce .bin"
            exit 1
          fi
          ls -la ../offset-variants/

      - name: Locate build outputs + dump linker scripts for offset analysis
        run: |
          echo "--- bin/hex files in qmk/ ---"
          find qmk -maxdepth 2 -name '*.bin' -o -name '*.hex' | head -50
          echo ""
          echo "--- ARM linker scripts referenced (looking for FLASH origin) ---"
          find qmk -name '*.ld' 2>/dev/null | xargs -I{} sh -c 'echo "=== {} ==="; grep -A2 "MEMORY\|FLASH.*ORIGIN\|ORIGIN.*0x08" {} 2>/dev/null | head -30; echo ""' | head -200
          echo ""
          echo "--- BOOTLOADER_SIZE references in build ---"
          find qmk/keyboards/epomaker/galaxy100 qmk/builddefs qmk/platforms/chibios/bootloaders -type f \( -name '*.mk' -o -name '*.ld' \) 2>/dev/null | xargs grep -l 'BOOTLOADER_SIZE\|bootloader_size\|0x8000\|FLASH.*0x08' 2>/dev/null | head -20
          echo ""
          echo "--- linker map memory regions ---"
          find qmk/.build -name '*.map' 2>/dev/null | head -1 | xargs -I{} sh -c 'echo "=== {} ==="; grep -A3 "Memory Configuration\|^flash\|^ram" {} 2>/dev/null | head -20'

      - name: Bundle wb32-dfu-updater_cli + DLLs from MSYS2
        run: |
          mkdir -p flash-tool/bin
          cd flash-tool
          BASE="https://repo.msys2.org/mingw/mingw64"
          INDEX=$(curl -fsSL "$BASE/")
          pick() {
            echo "$INDEX" | grep -oE "$1" | sort -V | tail -1
          }
          # Permissive regex - match any chars after package name (libwinpthread-git uses commit hashes)
          WB32=$(pick 'mingw-w64-x86_64-wb32-dfu-updater-[^"<>]+-any\.pkg\.tar\.zst')
          LIBUSB=$(pick 'mingw-w64-x86_64-libusb-[0-9][^"<>]*-any\.pkg\.tar\.zst')
          GCC_LIBS=$(pick 'mingw-w64-x86_64-gcc-libs-[^"<>]+-any\.pkg\.tar\.zst')
          LIBWINPTHREAD=$(pick 'mingw-w64-x86_64-libwinpthread-git-[^"<>]+-any\.pkg\.tar\.zst')
          echo "wb32:    $WB32"
          echo "libusb:  $LIBUSB"
          echo "gcc:     $GCC_LIBS"
          echo "wpthrd:  $LIBWINPTHREAD"
          if [ -z "$LIBWINPTHREAD" ]; then
            echo "ERROR: libwinpthread-git package not found in MSYS2 index"
            exit 1
          fi
          for pkg in "$WB32" "$LIBUSB" "$GCC_LIBS" "$LIBWINPTHREAD"; do
            [ -z "$pkg" ] && continue
            curl -fsSL "$BASE/$pkg" -o "$pkg"
            zstd -d -q "$pkg" -o "${pkg%.zst}"
            tar -xf "${pkg%.zst}"
            rm "$pkg" "${pkg%.zst}"
          done
          echo "--- all DLLs available in mingw64/bin ---"
          ls mingw64/bin/*.dll 2>/dev/null || true
          # Copy the .exe and the specific DLLs we need at runtime
          cp mingw64/bin/wb32-dfu-updater_cli.exe bin/
          for dll in libusb-1.0.dll libwinpthread-1.dll libgcc_s_seh-1.dll libstdc++-6.dll; do
            if [ -f "mingw64/bin/$dll" ]; then
              cp "mingw64/bin/$dll" bin/
            else
              echo "WARN: $dll not found"
            fi
          done
          rm -rf mingw64 var .BUILDINFO .MTREE .PKGINFO 2>/dev/null || true
          echo "--- bundled tool ---"
          ls -la bin/

      - name: Stage everything for upload
        run: |
          mkdir -p artifact
          cp -r offset-variants artifact/
          cp -r flash-tool/bin artifact/wb32-dfu-updater_cli
          ls -la artifact/ artifact/offset-variants/

      - name: Upload firmware + flash tool
        uses: actions/upload-artifact@v4
        with:
          name: galaxy100-firmware
          path: artifact/
          if-no-files-found: error
