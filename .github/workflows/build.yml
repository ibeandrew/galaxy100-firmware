name: Build Galaxy 100 firmware

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (overlay)
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Install ARM toolchain (no apt mirrors)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Install build-essential + zstd (with retries for flaky mirrors)
        run: |
          sudo apt-get -o Acquire::Retries=8 -o Acquire::http::Timeout=20 update -y
          sudo apt-get -o Acquire::Retries=8 -o Acquire::http::Timeout=20 install -y build-essential zstd

      - name: Install QMK CLI
        run: pip install qmk

      - name: Clone upstream QMK pinned to 0.25.10 (post-WB32, pre-pinAPI-rename)
        run: |
          git clone --depth=1 --branch=0.25.10 https://github.com/qmk/qmk_firmware.git qmk
          cd qmk
          git submodule update --init --recursive --depth=1

      - name: Install QMK 0.25.10's specific Python deps (appdirs etc.)
        run: pip install -r qmk/requirements.txt

      - name: Overlay Galaxy 100 keyboard files
        run: |
          mkdir -p qmk/keyboards/epomaker
          cp -r overlay/keyboards/epomaker/galaxy100 qmk/keyboards/epomaker/
          echo "--- overlaid layout ---"
          find qmk/keyboards/epomaker/galaxy100 -type f

      - name: Build firmware
        working-directory: qmk
        run: |
          qmk compile -kb epomaker/galaxy100 -km default

      - name: Locate build outputs
        run: |
          echo "--- bin/hex files in qmk/ ---"
          find qmk -maxdepth 2 -name '*.bin' -o -name '*.hex' | head -50

      - name: Bundle wb32-dfu-updater_cli + DLLs from MSYS2
        run: |
          sudo apt-get install -y zstd
          mkdir -p flash-tool/bin
          cd flash-tool
          BASE="https://repo.msys2.org/mingw/mingw64"
          # Discover latest available filenames (no Cloudflare from GitHub runners)
          INDEX=$(curl -fsSL "$BASE/")
          pick() {
            echo "$INDEX" | grep -oE "$1" | sort -V | tail -1
          }
          WB32=$(pick 'mingw-w64-x86_64-wb32-dfu-updater-[0-9.-]+-any\.pkg\.tar\.zst')
          LIBUSB=$(pick 'mingw-w64-x86_64-libusb-[0-9.-]+-any\.pkg\.tar\.zst')
          GCC_LIBS=$(pick 'mingw-w64-x86_64-gcc-libs-[0-9.-]+-any\.pkg\.tar\.zst')
          LIBWINPTHREAD=$(pick 'mingw-w64-x86_64-libwinpthread-git-[0-9a-f.-]+-any\.pkg\.tar\.zst')
          echo "wb32:    $WB32"
          echo "libusb:  $LIBUSB"
          echo "gcc:     $GCC_LIBS"
          echo "wpthrd:  $LIBWINPTHREAD"
          for pkg in "$WB32" "$LIBUSB" "$GCC_LIBS" "$LIBWINPTHREAD"; do
            [ -z "$pkg" ] && continue
            curl -fsSL "$BASE/$pkg" -o "$pkg"
            zstd -d -q "$pkg" -o "${pkg%.zst}"
            tar -xf "${pkg%.zst}"
            rm "$pkg" "${pkg%.zst}"
          done
          # Pick out exe + DLL deps
          cp mingw64/bin/wb32-dfu-updater_cli.exe bin/
          cp mingw64/bin/libusb-1.0.dll bin/
          cp mingw64/bin/libwinpthread-1.dll bin/
          cp mingw64/bin/libgcc_s_seh-1.dll bin/ 2>/dev/null || true
          cp mingw64/bin/libstdc++-6.dll bin/ 2>/dev/null || true
          # Cleanup
          rm -rf mingw64 var .BUILDINFO .MTREE .PKGINFO 2>/dev/null || true
          echo "--- bundled tool ---"
          ls -la bin/

      - name: Stage everything for upload
        run: |
          mkdir -p artifact
          cp qmk/.build/epomaker_galaxy100_default.bin artifact/ || cp qmk/*.bin artifact/
          cp -r flash-tool/bin artifact/wb32-dfu-updater_cli
          cat > artifact/FLASH-INSTRUCTIONS.md <<'EOF'
          # Flashing the Galaxy 100

          1. Put the keyboard in DFU mode (unplug, then hold the PCB reset
             button OR hold Esc while plugging in).
          2. From this folder run:

                 .\wb32-dfu-updater_cli\wb32-dfu-updater_cli.exe -D epomaker_galaxy100_default.bin

          3. Wait for "Done!". Unplug and replug the keyboard (out of DFU mode).
          EOF
          ls -la artifact/

      - name: Upload firmware + flash tool
        uses: actions/upload-artifact@v4
        with:
          name: galaxy100-firmware
          path: artifact/
          if-no-files-found: error
